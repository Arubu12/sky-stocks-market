<!DOCTYPE html>
<html>
<head>
  <title>Sky Stocks Market</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .topbar {
      background: #111827;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: #1f2937;
      padding: 20px;
      border-radius: 10px;
    }

    .big {
      font-size: 24px;
      font-weight: bold;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      border: none;
      background: #22c55e;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="topbar">
    Sky Stocks Market Dashboard 🚀
  </div>

  <div class="container">

    <div class="card">
      <div>Account Balance</div>
      <div class="big">$5,000</div>
    </div>

    <div class="card">
      <div>Profit Today</div>
      <div class="big">+$320</div>
    </div>

    <div class="card">
      <div>Trades</div>
      <div class="big">12</div>
    </div>

    <div class="card">
      <div>Bitcoin Price</div>
      <div class="big">$67,000</div>
    </div>

    <div class="card">
      <div>Trading</div>
      <button onclick="alert('Trading system coming soon')">Open Trade</button>
    </div>

    <div class="card">
      <div>Status</div>
      <div>Market Active</div>
    </div>

  </div>

</body>
</html>
